# Auth Service Configuration Example
# Copy this to config.yml to get started

auth_service:
  port: 8060
  health_port: 8061

db:
  host: localhost
  port: 5432
  user: postgres
  password: password
  dbname: grape_auth

redis:
  host: localhost
  port: 6379
  password: ""

emqx:
  broker: tcp://localhost:1883
  topic: otp/send
  client_id: auth-service

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from_email: ""

jwt:
  secret: "your-very-secret-key"

log:
  level: info
