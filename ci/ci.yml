name: auth-service CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy auth-service module
        run: |
          cd services/auth-service
          go mod edit -replace=github.com/your-moon/grape-shared=${{ github.workspace }}/grape-shared
          go mod tidy

      - name: Run tests
        run: |
          cd services/auth-service
          go test ./...

      - name: Build
        run: |
          cd services/auth-service
          go build -o /dev/null ./cmd/auth-service

  build-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/grape-auth-service:latest
